name: "Data Correction - Medical Items & Consumables"
description: "Report incorrect data for medical supplies, food, drinks, or other consumables."
title: "[Medical/Consumable] "
labels: ["data-correction", "MedicalItems", "Consumables"]
body:
  - type: input
    id: item-name
    attributes:
      label: Item Name
      placeholder: e.g. CAT Tourniquet, Propital, MRE
    validations:
      required: true

  - type: dropdown
    id: item-type
    attributes:
      label: Item Type
      options:
        - Medical (bandage / tourniquet / splint)
        - Medical (injector / drug)
        - Medical (surgery kit)
        - Food / Drink
        - Other Consumable
    validations:
      required: true

  - type: dropdown
    id: correction-type
    attributes:
      label: What is wrong?
      options:
        - Weight
        - Vendor / vendor rank
        - Heal amount / effect
        - Use time
        - Image wrong or missing
        - Item missing entirely
        - Other
    validations:
      required: true

  - type: textarea
    id: current-value
    attributes:
      label: Current (incorrect) value
    validations:
      required: true

  - type: textarea
    id: correct-value
    attributes:
      label: Correct value
    validations:
      required: true

  - type: textarea
    id: source
    attributes:
      label: Source / evidence

  - type: checkboxes
    id: verified
    attributes:
      label: Verification
      options:
        - label: I have verified this value in-game or from an official source.
          required: true
