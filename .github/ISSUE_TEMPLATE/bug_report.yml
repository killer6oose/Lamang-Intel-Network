name: "Bug Report"
description: "Something in the Loadout Builder or site is broken or behaving unexpectedly."
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe what you expected to happen vs what actually happened.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the builder
        2. Select weapon X
        3. ...
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: e.g. Chrome 124 on Windows 11

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot (optional)
      description: Paste or drag in a screenshot if it helps explain the issue.
