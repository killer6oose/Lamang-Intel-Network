<style>
:root {
  --jd:#1a2612;--jm:#2d4220;--jg:#4a6741;--jb:#6b9c5e;--jp:#8db87e;
  --ed:#2e1c0c;--eb:#5c3d1e;--em:#7a5230;--et:#a07040;--es:#c4a066;
  --uk:#0e0e0e;--ud:#1c1c1c;--uc:#2a2a2a;--um:#3e3e3e;--ug:#5a5a5a;--ul:#8a8a8a;--up:#b8b8b8;--uw:#e2e2e2;
  --mono:'Share Tech Mono',monospace;--disp:'Oswald',sans-serif;--body:'Barlow Condensed',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--uk);color:var(--up);font-family:var(--body);font-size:15px;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.025) 3px,rgba(0,0,0,.025) 4px);pointer-events:none;z-index:9999}
.sh{background:var(--jd);border-bottom:2px solid var(--jg);position:sticky;top:0;z-index:100}
.shi{max-width:1280px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{display:flex;align-items:center;gap:14px;text-decoration:none}
.logo img{width:36px;height:36px;flex-shrink:0}
.lm{font-family:var(--disp);font-size:16px;font-weight:700;letter-spacing:.08em;color:var(--jb);text-transform:uppercase;line-height:1;white-space:nowrap}
.ls{font-family:var(--mono);font-size:9px;color:var(--ul);letter-spacing:.2em;text-transform:uppercase;white-space:nowrap}
.hnav{display:flex;align-items:center;gap:2px;flex-wrap:nowrap}
.nl{font-family:var(--body);font-size:12px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--ul);text-decoration:none;padding:5px 10px;border:1px solid transparent;transition:all .18s;white-space:nowrap}
.nl:hover{color:var(--jb);border-color:var(--jm);background:rgba(74,103,65,.12)}
.nl.active{color:var(--jp);border-color:var(--jg);background:rgba(74,103,65,.2)}
.hero{background:var(--jd);border-bottom:1px solid var(--jm);padding:44px 32px 36px}
.hero-inner{max-width:1140px;margin:0 auto}
.hero-eye{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--jb);margin-bottom:12px}
.hero-eye::before{content:'';display:block;width:24px;height:1px;background:var(--jb)}
.hero-h1{font-family:var(--disp);font-size:clamp(36px,5vw,58px);font-weight:700;line-height:.95;letter-spacing:.04em;text-transform:uppercase;color:var(--uw);margin-bottom:10px}
.hero-h1 em{color:var(--jb);font-style:normal}
.hero-sub{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ug)}
.body{max-width:1140px;margin:0 auto;padding:36px 32px 56px}
.sec-lbl{display:flex;align-items:center;gap:12px;font-family:var(--mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--jb);margin-bottom:16px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--um)}
.boss-tabs{display:flex;flex-wrap:wrap;gap:1px;background:var(--um);border:1px solid var(--um)}
.boss-tab{background:var(--ud);border:none;cursor:pointer;padding:9px 16px;font-family:var(--disp);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ug);transition:all .14s;display:flex;flex-direction:column;gap:2px;text-align:left;flex-shrink:0}
.boss-tab:hover{background:var(--uc);color:var(--up)}
.boss-tab.active{background:var(--jg);color:var(--uw)}
.boss-tab.active .bt-sub{color:rgba(226,226,226,.6)}
.bt-nm{font-size:13px}
.bt-sub{font-size:9px;letter-spacing:.08em;color:var(--ug);font-family:var(--mono)}
.boss-panel{display:none;margin-top:2px}
.boss-panel.active{display:block}
.boss-panel-inner{background:var(--ud);border:1px solid var(--um);border-top:2px solid var(--jg);padding:28px 32px}
.bp-video{position:relative;width:100%;padding-bottom:56.25%;background:#000;border:1px solid var(--jm);margin-bottom:22px;overflow:hidden}
.bp-video video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.bp-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 32px}
.bp-name{font-family:var(--disp);font-size:34px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--uw);line-height:1;margin-bottom:2px;grid-column:1/-1}
.bp-callsign{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--jb);margin-bottom:20px;grid-column:1/-1}
.bp-stat{display:flex;justify-content:space-between;align-items:baseline;font-family:var(--mono);font-size:10px;padding:7px 0;border-bottom:1px solid rgba(62,62,62,.5)}
.bp-stat-lbl{color:var(--ug);text-transform:uppercase;letter-spacing:.1em}
.bp-stat-val{color:var(--ul);text-align:right}
.bp-stat-val.hi{color:var(--jp)}
.type-badge{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border:1px solid var(--um);color:var(--ul)}
.type-faction{border-color:var(--et);color:var(--es)}
.type-laf{border-color:var(--jm);color:var(--jp)}
.type-starter{border-color:var(--ug);color:var(--up)}
.diff{display:flex;align-items:center;gap:5px}
.diff-pip{width:8px;height:8px;border-radius:1px}
.diff-easy .diff-pip{background:var(--jb)}
.diff-mid  .diff-pip{background:var(--et)}
.diff-hard .diff-pip{background:#c43030}
.bp-intel{margin-top:18px;padding-top:14px;border-top:1px solid var(--um);grid-column:1/-1}
.bp-intel-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--ug);margin-bottom:7px}
.bp-intel-txt{font-size:13px;color:var(--ul);line-height:1.9;font-style:italic}
.loot-tag{background:rgba(45,66,32,.3);border:1px solid var(--jm);color:var(--jp);font-family:var(--mono);font-size:9px;letter-spacing:.08em;padding:2px 8px;display:inline-block}
.loc-list{display:flex;flex-wrap:wrap;gap:4px;justify-content:flex-end}
.loc-pill{background:var(--uc);border:1px solid var(--um);color:var(--up);font-family:var(--mono);font-size:9px;letter-spacing:.06em;padding:2px 7px}
.ft{background:var(--jd);border-top:1px solid var(--jm);padding:20px 24px;display:flex;align-items:center;justify-content:space-between}
.ft-br{font-family:var(--disp);font-size:14px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--jg)}
.ft-sub{font-family:var(--mono);font-size:9px;color:var(--ug);letter-spacing:.08em;margin-top:2px}
.ft-lks{display:flex;gap:18px}
.ft-lk{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ul);text-decoration:none;transition:color .14s}
.ft-lk:hover{color:var(--jb)}
@media(max-width:900px){.bp-grid{grid-template-columns:1fr}.bp-name,.bp-callsign,.bp-intel{grid-column:1}}
@media(max-width:700px){.hnav{display:none}.hero{padding:28px 20px}.body{padding:24px 16px}.boss-panel-inner{padding:20px 16px}.boss-tab{padding:7px 12px}}
</style>
</head>
<body>
<header class="sh">
  <div class="shi">
    <a href="index.html" class="logo">
      <img src="logo.png" width="36" height="36" alt="Lamang Intelligence Network" />
      <div><div class="lm">Lamang Intelligence Network</div><div class="ls">Boss Intel</div></div>
    </a>
    <nav class="hnav" aria-label="Main navigation">
      <a href="index.html"     class="nl">Home</a>
      <a href="tracker.html"   class="nl">Vulture Tracking</a>
      <a href="bosses.html"    class="nl active">Bosses</a>
      <a href="ammo.html"      class="nl">Ammo Chart</a>
      <a href="blueprints.html" class="nl">Blueprints</a>
      <a href="/builder" class="nl">Loadout Builder</a>
      <a href="https://gray-zone-warfare.fandom.com" target="_blank" rel="noopener" class="nl">Wiki &#x2197;</a>
    </nav>
  </div>
</header>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-eye">Field Intelligence</div>
    <h1 class="hero-h1">Faction <em>Bosses</em></h1>
    <div class="hero-sub" id="hero-sub">Loading&hellip;</div>
  </div>
</div>

<div class="body">
  <div class="sec-lbl">Intelligence Dossier</div>
  <div class="boss-tabs" id="boss-tabs"></div>
  <div id="boss-panels"></div>
</div>

<footer class="ft">
  <div><div class="ft-br">GZW Guides</div><div class="ft-sub">Not affiliated with MADFINGER Games.</div></div>
  <div class="ft-lks">
    <a href="index.html"   class="ft-lk">Home</a>
    <a href="tracker.html" class="ft-lk">Tracker</a>
    <a href="ammo.html"    class="ft-lk">Ammo</a>
    <a href="admin.html"   class="ft-lk" style="color:var(--ug)">Admin</a>
  </div>
</footer>

<script>
(function(){

  function typeClass(t){
    if(t==='Faction Leader')return 'type-faction';
    if(t==='LAF Commander')return 'type-laf';
    if(t==='Starter Town Boss')return 'type-starter';
    return '';
  }

  function diffHtml(d){
    if(!d)return '<span class="bp-stat-val">-</span>';
    var dl=d.toLowerCase();
    var count=dl==='hard'?3:dl==='mid'?2:1;
    var pips='';
    for(var i=0;i<count;i++)pips+='<span class="diff-pip"></span>';
    return '<span class="bp-stat-val"><span class="diff diff-'+dl+'">'+pips+'</span> '+d+'</span>';
  }

  function esc(s){
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function buildTab(b){
    var hasCallsign=b.callsign&&b.callsign!==b.name;
    var tabName=hasCallsign?b.callsign:b.name;
    var tabSub=hasCallsign?(b.name+' · '+b.faction):b.faction;
    var btn=document.createElement('button');
    btn.className='boss-tab';
    btn.setAttribute('data-id',b.id);
    btn.innerHTML='<span class="bt-nm">'+esc(tabName)+'</span><span class="bt-sub">'+esc(tabSub)+'</span>';
    return btn;
  }

  function buildPanel(b){
    var hasCallsign=b.callsign&&b.callsign!==b.name;
    var callsignLine=hasCallsign
      ?'// Callsign: "'+esc(b.callsign)+'" &mdash; '+esc(b.faction)
      :'// '+esc(b.type)+' &mdash; '+esc(b.faction);

    var locPills=(b.locations||[]).map(function(l){
      return '<span class="loc-pill">'+esc(l)+'</span>';
    }).join('');

    var videoHtml='';
    if(b.videoUrl){
      videoHtml='<div class="bp-video"><video src="'+esc(b.videoUrl)+'" muted autoplay loop playsinline></video></div>';
    }

    var wrap=document.createElement('div');
    wrap.id='panel-'+b.id;
    wrap.className='boss-panel';
    wrap.innerHTML=
      '<div class="boss-panel-inner">'+
        videoHtml+
        '<div class="bp-grid">'+
          '<div class="bp-name">'+esc(b.name)+'</div>'+
          '<div class="bp-callsign">'+callsignLine+'</div>'+
          '<div>'+
            '<div class="bp-stat"><span class="bp-stat-lbl">Faction</span><span class="bp-stat-val">'+esc(b.faction)+'</span></div>'+
            '<div class="bp-stat"><span class="bp-stat-lbl">Type</span><span class="bp-stat-val"><span class="type-badge '+esc(typeClass(b.type))+'">'+esc(b.type)+'</span></span></div>'+
            '<div class="bp-stat"><span class="bp-stat-lbl">Difficulty</span>'+diffHtml(b.difficulty)+'</div>'+
            '<div class="bp-stat"><span class="bp-stat-lbl">Notable Loot</span><span class="bp-stat-val hi"><span class="loot-tag">'+esc(b.notableLoot||'-')+'</span></span></div>'+
          '</div>'+
          '<div>'+
            '<div class="bp-stat"><span class="bp-stat-lbl">Locations</span><span class="bp-stat-val"><div class="loc-list">'+locPills+'</div></span></div>'+
            '<div class="bp-stat"><span class="bp-stat-lbl">Respawn</span><span class="bp-stat-val">~15 min</span></div>'+
          '</div>'+
          (b.intel?'<div class="bp-intel"><div class="bp-intel-lbl">Intel</div><div class="bp-intel-txt">'+esc(b.intel)+'</div></div>':'')+
        '</div>'+
      '</div>';
    return wrap;
  }

  var activeId=null;

  function switchTo(id){
    if(id===activeId)return;
    // pause current video
    if(activeId){
      var oldPanel=document.getElementById('panel-'+activeId);
      if(oldPanel){
        var oldVid=oldPanel.querySelector('video');
        if(oldVid)oldVid.pause();
        oldPanel.classList.remove('active');
      }
      var oldTab=document.querySelector('.boss-tab[data-id="'+activeId+'"]');
      if(oldTab)oldTab.classList.remove('active');
    }
    activeId=id;
    var newPanel=document.getElementById('panel-'+id);
    if(newPanel){
      newPanel.classList.add('active');
      var newVid=newPanel.querySelector('video');
      if(newVid){newVid.currentTime=0;newVid.play();}
      newPanel.scrollIntoView({behavior:'smooth',block:'nearest'});
    }
    var newTab=document.querySelector('.boss-tab[data-id="'+id+'"]');
    if(newTab)newTab.classList.add('active');
  }

  var tabsEl=document.getElementById('boss-tabs');
  var panelsEl=document.getElementById('boss-panels');
  var heroSub=document.getElementById('hero-sub');

  // Inject WebPage + FAQPage structured data once boss data loads
  function injectSchema(bosses){
    var faqs=bosses.map(function(b){
      var locs=(b.locations||[]).join(', ') || 'Unknown';
      var q='Where does '+(b.callsign&&b.callsign!==b.name?b.callsign+' ('+b.name+')':b.name)+' spawn in Gray Zone Warfare?';
      var a=b.name+' is a '+b.type+' for '+b.faction+'. Known spawn locations: '+locs+'. Notable loot: '+(b.notableLoot||'Unknown')+'. Difficulty: '+(b.difficulty||'Unknown')+'.';
      return {'@type':'Question','name':q,'acceptedAnswer':{'@type':'Answer','text':a}};
    });
    var schema={
      '@context':'https://schema.org',
      '@graph':[
        {
          '@type':'WebPage',
          'name':'Gray Zone Warfare Boss Locations and Intel',
          'description':'Spawn locations, faction, difficulty and loot for all '+bosses.length+' bosses in Gray Zone Warfare on Lamang Island.',
          'url':'https://lamangintel.net/bosses.html',
          'isPartOf':{'@type':'WebSite','name':'GZW Guides','url':'https://lamangintel.net'},
          'breadcrumb':{'@type':'BreadcrumbList','itemListElement':[
            {'@type':'ListItem','position':1,'name':'Home','item':'https://lamangintel.net/'},
            {'@type':'ListItem','position':2,'name':'Boss Intel','item':'https://lamangintel.net/bosses.html'}
          ]}
        },
        {
          '@type':'FAQPage',
          'name':'Gray Zone Warfare Boss Spawn Locations FAQ',
          'mainEntity':faqs
        }
      ]
    };
    var el=document.createElement('script');
    el.type='application/ld+json';
    el.textContent=JSON.stringify(schema);
    document.head.appendChild(el);
  }

  fetch('data/bosses.json?t='+Date.now())
    .then(function(r){return r.json();})
    .then(function(bosses){
      if(!bosses||!bosses.length)return;
      injectSchema(bosses);

      // count unique factions
      var factions={};
      bosses.forEach(function(b){factions[b.faction]=1;});
      var factionCount=Object.keys(factions).length;
      heroSub.textContent=bosses.length+' Bosses · '+factionCount+' Factions · Lamang Island';

      bosses.forEach(function(b,i){
        var tab=buildTab(b);
        tab.addEventListener('click',function(){switchTo(b.id);});
        tabsEl.appendChild(tab);

        var panel=buildPanel(b);
        panelsEl.appendChild(panel);

        if(i===0){
          tab.classList.add('active');
          panel.classList.add('active');
          activeId=b.id;
          // kick off first video
          var vid=panel.querySelector('video');
          if(vid)vid.play();
        }
      });
    })
    .catch(function(){
      heroSub.textContent='Failed to load boss data.';
    });

})();
</script>
</body>
</html>
